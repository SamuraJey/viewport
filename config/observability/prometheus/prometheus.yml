global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service_namespace: viewport
    environment: local # Operator TODO: override in production deployment.

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]
        labels:
          service: prometheus

  - job_name: viewport-api
    metrics_path: /metrics
    static_configs:
      - targets: [app:8000]
        labels:
          service: viewport-api
    # Security TODO: production /metrics must be private to Prometheus/collector infrastructure.

  - job_name: viewport-celery
    metrics_path: /metrics
    static_configs:
      - targets: [celery_worker:9108]
        labels:
          service: viewport-celery

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]
        labels:
          service: otel-collector
      - targets: [otel-collector:8889]
        labels:
          service: otel-collector-otlp-metrics

  - job_name: loki
    static_configs:
      - targets: [loki:3100]
        labels:
          service: loki

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]
        labels:
          service: tempo

  - job_name: grafana
    static_configs:
      - targets: [grafana:3000]
        labels:
          service: grafana

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]
        labels:
          service: alertmanager

  - job_name: postgres-exporter
    static_configs:
      - targets: [postgres-exporter:9187]
        labels:
          service: postgres

  - job_name: redis-exporter
    static_configs:
      - targets: [redis-exporter:9121]
        labels:
          service: redis

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
        labels:
          service: container-runtime

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]
        labels:
          service: host

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://app:8000/metrics
        labels:
          service: viewport-api
          probe: internal-metrics
          runbook: metrics-exposure
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
