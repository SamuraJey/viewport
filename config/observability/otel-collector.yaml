receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 5s
    send_batch_size: 1024
  resource/viewport:
    attributes:
      - key: service.namespace
        value: viewport
        action: upsert
      - key: deployment.environment
        value: local
        action: insert
  attributes/privacy:
    actions:
      # Defense in depth: application spans are sanitized before export, and
      # collector policy deletes known raw/high-cardinality HTTP/user fields if
      # an upstream emitter bypasses the app sanitizer.
      - key: http.target
        action: delete
      - key: http.url
        action: delete
      - key: http.user_agent
        action: delete
      - key: http.client_ip
        action: delete
      - key: url.full
        action: delete
      - key: url.path
        action: delete
      - key: url.query
        action: delete
      - key: user_agent.original
        action: delete
      - key: client.address
        action: delete
      - key: client.socket.address
        action: delete
      - key: net.peer.ip
        action: delete
      - key: network.peer.address
        action: delete
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: http.request.header.user-agent
        action: delete
      - key: http.response.header.set-cookie
        action: delete
      - key: db.statement
        action: delete
      - key: enduser.id
        action: delete
      - key: user.email
        action: delete
      - key: s3.object.key
        action: delete
      - key: share_id
        action: delete
      - key: share_password
        action: delete
  probabilistic_sampler/local:
    sampling_percentage: 100

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: viewport_otel
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/viewport, attributes/privacy, probabilistic_sampler/local, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/viewport, attributes/privacy, batch]
      exporters: [prometheus]
