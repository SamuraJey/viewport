<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewport</title>
  <!-- Tailwind CSS dark mode init: apply stored or system preference before styles load -->
  <script>
    ; (() => {
      const preferenceKey = 'theme-preference'

      const resolveSystemTheme = () =>
        window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'

      const storedPreference = localStorage.getItem(preferenceKey)

      const preference =
        storedPreference === 'dark' || storedPreference === 'light' || storedPreference === 'system'
          ? storedPreference
          : 'system'

      if (!storedPreference) {
        localStorage.setItem(preferenceKey, preference)
      }

      const resolvedTheme = preference === 'system' ? resolveSystemTheme() : preference

      document.documentElement.classList.remove('dark', 'light')
      document.documentElement.classList.add(resolvedTheme)
    })()
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
