<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewport</title>
  <!-- Tailwind CSS dark mode init: apply stored or system preference before styles load -->
  <script>
    ; (() => {
      const preferenceKey = 'theme-preference'

      const resolveSystemTheme = () =>
        window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'

      let storedPreference = null
      try {
        storedPreference = localStorage.getItem(preferenceKey)
      } catch (e) {
        // Storage access failed (privacy mode / quota); fall back to non-persistent behavior
        storedPreference = null
      }

      const preference =
        storedPreference === 'dark' || storedPreference === 'light' || storedPreference === 'system'
          ? storedPreference
          : 'system'

      // Try to persist the default preference, but don't let failures stop theme application
      try {
        if (!storedPreference) {
          localStorage.setItem(preferenceKey, preference)
        }
      } catch (e) {
        // ignore persistence errors
      }

      const resolvedTheme = preference === 'system' ? resolveSystemTheme() : preference

      document.documentElement.classList.remove('dark', 'light')
      document.documentElement.classList.add(resolvedTheme)
    })()
  </script>
  <!-- Preload fonts for better performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
